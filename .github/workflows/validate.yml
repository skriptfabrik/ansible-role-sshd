name: Ansible Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Ansible Role
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run yamllint
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5.0

      - name: Run ansible-lint
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0

  molecule:
    name: Run Molecule Tests
    defaults:
      run:
        working-directory: skriptfabrik.sshd
    needs:
      - lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - debian11
          - debian12
          - debian13
          - ubuntu2004
          - ubuntu2204
          - ubuntu2404
          - ubuntu2604
      fail-fast: false

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: skriptfabrik.sshd

      - name: Set up Python 3.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "molecule-plugins[docker]" "molecule-plugins[lint]"
          pip install --upgrade ansible docker "molecule[docker]"

      - name: Verify Molecule plugins installation
        run: |
          molecule --version
          molecule lint --help || echo "Lint plugin is not installed correctly"
          pip install "molecule-plugins[lint]"

      - name: Run Molecule tests.
        run: pwd; ls -la; molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}
