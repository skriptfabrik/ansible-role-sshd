---
dependency:
  name: galaxy
  requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: molecule
    image: geerlingguy/docker-${MOLECULE_DISTRO:-debian12}-ansible
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /run
      - /run/lock

scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - destroy
